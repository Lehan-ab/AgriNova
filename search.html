<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Services - Agrinova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#064e3b', secondary: '#10b981', accent: '#fbbf24', lightbg: '#f8fafc' } } }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</head>

<body class="bg-gray-50 font-sans antialiased flex flex-col min-h-screen">
    <nav class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                    <i class="fas fa-leaf text-secondary text-xl"></i>
                    <span class="font-bold text-xl">Agrinova</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Search Header -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 md:p-6 mb-8">
            <form id="searchForm" class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="What service are you looking for?"
                        class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition bg-gray-50 focus:bg-white text-gray-700 font-medium">
                </div>
                <div class="w-full md:w-64 relative shrink-0">
                    <i class="fas fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <select id="locationInput"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition bg-gray-50 appearance-none font-medium text-gray-700">
                        <option value="">All Locations</option>
                        <option value="Kurunegala">Kurunegala</option>
                        <option value="Anuradhapura">Anuradhapura</option>
                        <option value="Dambulla">Dambulla</option>
                        <option value="Kandy">Kandy</option>
                    </select>
                </div>
                <button type="submit"
                    class="px-8 py-3 bg-primary text-white rounded-xl font-bold hover:bg-emerald-800 transition shadow-md whitespace-nowrap">Search</button>
            </form>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar Filters -->
            <div class="w-full lg:w-64 shrink-0">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sticky top-24">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">Filters</h3>
                        <button type="button" class="text-xs text-primary hover:underline">Clear all</button>
                    </div>

                    <div class="mb-5">
                        <h4 class="text-sm font-semibold text-gray-700 mb-2">Category</h4>
                        <div class="space-y-2" id="categoryFilters">
                            <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600"><input
                                    type="checkbox" value="Machinery"
                                    class="rounded text-primary focus:ring-primary accent-primary w-4 h-4">
                                Machinery</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600"><input
                                    type="checkbox" value="Seeds"
                                    class="rounded text-primary focus:ring-primary accent-primary w-4 h-4">
                                Seeds</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600"><input
                                    type="checkbox" value="Transport"
                                    class="rounded text-primary focus:ring-primary accent-primary w-4 h-4">
                                Transport</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600"><input
                                    type="checkbox" value="Advisory"
                                    class="rounded text-primary focus:ring-primary accent-primary w-4 h-4">
                                Advisory</label>
                        </div>
                    </div>

                    <div class="mb-5">
                        <h4 class="text-sm font-semibold text-gray-700 mb-2">Trust & Safety</h4>
                        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600">
                            <input type="checkbox" id="verifiedOnly"
                                class="rounded text-primary focus:ring-primary accent-primary w-4 h-4">
                            Verified Only <i class="fas fa-check-circle text-blue-500"></i>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Results Listing -->
            <div class="flex-grow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800" id="resultsCount">Loading templates...</h2>
                    <select
                        class="text-sm border-gray-300 rounded-md shadow-sm outline-none bg-white py-1 px-2 border focus:border-primary">
                        <option>Sort by: Recommended</option>
                        <option>Highest Rated</option>
                    </select>
                </div>

                <div id="resultsContainer" class="space-y-4">
                    <!-- Rendering skeleton or fallback -->
                    <div class="animate-pulse flex gap-4 p-4 bg-white rounded-xl border border-gray-200">
                        <div class="w-16 h-16 bg-gray-200 rounded-lg"></div>
                        <div class="flex-1 space-y-2 py-1">
                            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                            <div class="h-3 bg-gray-200 rounded w-1/4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/search.js"></script>
</body>

</html>
