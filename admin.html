<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Agrinova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1e293b', secondary: '#3b82f6', accent: '#f59e0b', success: '#10b981' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</head>

<body class="bg-slate-100 font-sans antialiased text-slate-800 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-shield-alt text-secondary text-xl"></i>
                <span class="font-bold text-xl tracking-tight">Agrinova Admin</span>
            </div>
            <button id="logoutBtn"
                class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-medium transition">Exit
                Admin</button>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-6">

        <!-- Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 border-t-4 border-t-blue-500">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Users</p>
                <div class="flex justify-between items-end">
                    <h3 class="text-2xl font-bold text-slate-800">1,248</h3>
                    <span class="text-xs text-green-500 font-bold bg-green-50 px-2 py-1 rounded"><i
                            class="fas fa-arrow-up"></i> 12%</span>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 border-t-4 border-t-success">
                <p class="text-sm font-medium text-slate-500 mb-1">Verified Suppliers</p>
                <div class="flex justify-between items-end">
                    <h3 class="text-2xl font-bold text-slate-800">342</h3>
                    <span class="text-xs text-green-500 font-bold bg-green-50 px-2 py-1 rounded"><i
                            class="fas fa-arrow-up"></i> 5%</span>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 border-t-4 border-t-accent">
                <p class="text-sm font-medium text-slate-500 mb-1">Pending Approvals</p>
                <div class="flex justify-between items-end">
                    <h3 class="text-2xl font-bold text-slate-800" id="pendingCount">3</h3>
                    <i class="fas fa-clock text-accent opacity-50 text-xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 border-t-4 border-t-purple-500">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Bookings</p>
                <div class="flex justify-between items-end">
                    <h3 class="text-2xl font-bold text-slate-800">856</h3>
                    <span class="text-xs text-green-500 font-bold bg-green-50 px-2 py-1 rounded"><i
                            class="fas fa-arrow-up"></i> 24%</span>
                </div>
            </div>
        </div>

        <!-- Moderation Panel -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-slate-800"><i class="fas fa-tasks mr-2 text-primary"></i> Verification Queue
                </h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white border-b border-slate-200 text-sm text-slate-500 uppercase tracking-wider">
                            <th class="p-4 font-semibold">Supplier Name</th>
                            <th class="p-4 font-semibold">Category</th>
                            <th class="p-4 font-semibold">Location</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="moderationTable" class="divide-y divide-slate-100 text-sm">
                        <!-- Content populated via JS -->
                    </tbody>
                </table>
            </div>

            <div id="emptyAdminState" class="hidden p-8 text-center text-slate-500">
                <i class="fas fa-check-circle text-4xl text-green-400 mb-3 block"></i>
                <p class="font-medium">All caught up! No pending verifications.</p>
            </div>
        </div>

    </main>

    <script src="js/admin.js"></script>
</body>

</html>
